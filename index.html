<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room: Code Challenges</title>
    <link rel="preload" href="images/background.jpg" as="image">
    <link rel="preload" as="style" href="styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>THE ESCAPE ROOM: Code Challenges</h1>
        
        <!-- Timer Section -->
        <div id="timer">
            <div id="timer-background"></div>
            <p>Time Remaining: <span id="time">05:00</span></p>
        </div>

        <!-- Room Description -->
        <div id="room-description">
            <p>You are trapped in a room with coding challenges. Choose a language and solve the challenges to escape!</p>
        </div>

        <!-- Difficulty Selector -->
        <div id="difficulty-selector" style="margin-bottom: 20px;">
            <label for="difficulty">Select Difficulty: </label>
            <select id="difficulty" style="padding: 5px; background: #333; color: white; border: 1px solid #941818; border-radius: 5px;">
                <option value="1">Standard (1x Time)</option>
                <option value="0.75">Hard (0.75x Time)</option>
                <option value="0.5">FAANG Interview (0.5x Time)</option>
            </select>
        </div>

        <!-- Doors Section -->
        <div id="doors">
            <!-- Doors will be dynamically added here -->
        </div>

        <!-- Challenge Modal -->
        <div id="challenge-modal" class="modal">
            <div class="modal-content">
                <span id="close-modal" class="close">&times;</span>
                <h2 id="challenge-title"></h2>
                <p id="challenge-description"></p>
                <textarea id="code-input" placeholder="Write your code here..." rows="10" cols="50"></textarea>
                <button id="submit-code">Submit</button>
                <p id="code-result"></p>
                <button id="hint-button">Show Hint</button>
                <div id="hint-container" style="display: none;">
                    <p id="hint-text"></p>
                </div>
            </div>
        </div>

        <!-- Leaderboard Modal -->
        <div id="leaderboard-modal" class="modal">
            <div class="modal-content">
                <span id="close-leaderboard-modal" class="close">&times;</span>
                <h2>Leaderboard</h2>
                <p>Congratulations! You escaped the room in <span id="total-time"></span> seconds.</p>
                <table id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Door</th>
                            <th>Time Taken (seconds)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Leaderboard rows will be dynamically added here -->
                    </tbody>
                </table>
                <!-- Logout Button -->
                <button id="logout-button">Logout</button>
            </div>
        </div>

        <!-- Immersive Custom Alert -->
        <div id="customAlert" class="custom-alert hidden">
            <div class="custom-alert-content">
                <h2 id="customAlertTitle">Message</h2>
                <p id="customAlertMessage">Something went wrong.</p>
                <button id="customAlertClose">Understood</button>
            </div>
        </div>
        
        <!-- Jump Scare Container -->
        <div id="jumpScare" class="jump-scare">
            <img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTJ8fGhvcnJvcnxlbnwwfHwwfHw%3D&auto=format&fit=crop&w=800&q=60" alt="Jump Scare">
        </div>

        <!-- Main Logout Button -->
        <button id="main-logout-button">Logout</button>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
